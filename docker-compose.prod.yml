services:
  fitematch-site:
    container_name: fitematch-site
    image: fitematch-site:production
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV}
    ports:
      - '3001:3000'
    env_file:
      - .env.production
    restart: unless-stopped
